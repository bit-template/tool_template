plugins {
    id 'base'
}

ext {
    gatewayUrl = "http://127.0.0.1:8080"
    templateName = "python3-flask-debian"   // declare here
    templateRepo = "https://github.com/bit-template/python-flask-template.git"
    templateBranch = "master"                // optional, default branch
}

tasks.create("downloadTemplate") {
    group = "faas"
    description = "Download template folder from Git repository"

    doLast {
        def buildTemplateDir = file("build/template/${templateName}")
        def tempDir = file("build/faas_templates_temp")

        if (tempDir.exists()) tempDir.deleteDir()
        tempDir.mkdirs()

        // Initialize git repo
        exec { workingDir tempDir; commandLine "git", "init" }
        exec { workingDir tempDir; commandLine "git", "remote", "add", "-f", "origin", templateRepo }
        exec { workingDir tempDir; commandLine "git", "config", "core.sparseCheckout", "true" }

        // Sparse checkout file
        def sparseFile = new File(tempDir, ".git/info/sparse-checkout")
        sparseFile.text = "template/${templateName}/*\n"

        // Pull the folder
        exec { workingDir tempDir; commandLine "git", "pull", "origin", templateBranch }

        // Copy to build/template/
        copy {
            from new File(tempDir, "template/${templateName}")
            into file(buildTemplateDir)
        }

        println "Template '${templateName}' downloaded to ${buildTemplateDir.absolutePath}"
        tempDir.deleteDir()
    }
}

tasks.create("copySources") {
    group = "faas"
    description = "Copy main folder and ${functionName} into build directory"
    dependsOn("downloadTemplate")
    doLast {
        // Copy handler folder
        copy {
            from "function"
            into "build/function"
        }

        // Copy function yml
        copy {
            from "stack.yml"
            into "build"
        }

        println "Copied function/ and stack.yml into build/"
    }
}

tasks.create("build") {
    group = "faas"
    description = "Build the faas function image"
    dependsOn("copySources")
    doLast {
        exec {
            workingDir "build"                  // run inside build/
            commandLine "faas-cli", "build", "-f", "stack.yml"
        }
    }
}

tasks.create("push") {
    group = "faas"
    description = "Push the faas function image"
    doLast {
        exec {
            workingDir "build"                  // run inside build/
            commandLine "faas-cli", "push", "-f", "stack.yml"
        }
    }
}

tasks.create("deploy") {
    group = "faas"
    description = "Deploy the faas function"
    doLast {
        exec {
            workingDir "build"                  // run inside build/
            commandLine "faas-cli", "deploy", "-f", "stack.yml"
        }
    }
}

def warmupLine = "@reboot /bin/bash -lc 'until curl -s http://127.0.0.1:8080/healthz > /dev/null; do sleep 5; done; export OPENFAAS_URL=http://127.0.0.1:8080; echo warmup | /usr/local/bin/faas-cli invoke SmartSort >> ~/faas-warmup.log 2>&1'"

tasks.register("installWarmupCron") {
    group = "ops"
    description = "Install @reboot cron to warm OpenFaaS function 'SmartSort'"

    doLast {
        def existing = new ByteArrayOutputStream()
        exec {
            commandLine "bash", "-lc", "crontab -l || true"
            standardOutput = existing
        }
        def current = existing.toString("UTF-8")
        if (!current.contains(warmupLine)) {
            def tmp = File.createTempFile("crontab", ".tmp")
            tmp.text = (current.trim() + System.lineSeparator() + warmupLine + System.lineSeparator()).trim() + System.lineSeparator()
            exec {
                commandLine "bash", "-lc", "crontab ${tmp.absolutePath}"
            }
            println "Installed warmup cron entry."
        } else {
            println "Warmup cron entry already present. Skipping."
        }
    }
}

tasks.register("removeWarmupCron") {
    group = "ops"
    description = "Remove the warmup @reboot cron entry"

    doLast {
        def existing = new ByteArrayOutputStream()
        exec {
            commandLine "bash", "-lc", "crontab -l || true"
            standardOutput = existing
        }
        def lines = existing.toString("UTF-8")
                .readLines()
                .findAll { it.trim() && !it.contains("faas-cli invoke SmartSort") }
                .join(System.lineSeparator()) + System.lineSeparator()
        def tmp = File.createTempFile("crontab", ".tmp")
        tmp.text = lines
        exec {
            commandLine "bash", "-lc", "crontab ${tmp.absolutePath}"
        }
        println "Removed warmup cron entry (if existed)."
    }
}
